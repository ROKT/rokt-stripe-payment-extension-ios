name: Pull Request

permissions:
  contents: read
  pull-requests: read
  id-token: write

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trunk-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trunk Check
        uses: trunk-io/trunk-action@75699af9e26881e564e9d832ef7dc3af25ec031b # v1.2.4
        with:
          check-mode: all

  unit-test:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and run unit tests
        run: |
          xcodebuild test \
            -scheme RoktStripePaymentExtension \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Export coverage
        if: always()
        run: |
          xcrun llvm-cov export \
            $(find ~/Library/Developer/Xcode/DerivedData -name 'RoktStripePaymentExtension.o' -type f | head -1) \
            -instr-profile $(find ~/Library/Developer/Xcode/DerivedData -name 'Coverage.profdata' -type f | head -1) \
            -format lcov > coverage.lcov 2>/dev/null || true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: false

  podspec-lint:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint podspec
        run: pod lib lint RoktStripePaymentExtension.podspec --allow-warnings --verbose

  pr-notify:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    name: Notify GChat
    needs: [unit-test, podspec-lint]
    uses: ROKT/rokt-workflows/.github/workflows/oss_pr_opened_notification.yml@main
    secrets:
      gchat_webhook: ${{ secrets.GCHAT_PRS_MOBILE_INTEGRATION_CHANNEL_WEBHOOK }}
