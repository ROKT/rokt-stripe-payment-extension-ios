---
# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see
# https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.12
plugins:
  sources:
    - id: trunk
      ref: v1.6.8
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - node@18.20.5
    - python@3.10.8
lint:
  enabled:
    - checkov@3.2.408
    - osv-scanner@2.0.1
    - trufflehog@3.88.25
    - swiftformat@0.55.5
    - git-diff-check
    - markdownlint@0.44.0
    - prettier@3.5.3
    - shellcheck@0.10.0
    - shfmt@3.6.0
    - swiftlint@0.58.2
    - actionlint@1.7.7
    - yamllint@1.37.0
  ignore:
    - linters: [ALL]
      paths:
        - Tests/**
actions:
  enabled:
    - trunk-check-pre-push
    - trunk-announce
    - trunk-fmt-pre-commit
    - trunk-check-pre-commit
    - trunk-upgrade-available
